services:
  db:
    container_name: price_tracker_db
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: price_tracker_redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  worker:
    container_name: price_tracker_worker
    image: python:3.13-slim
    working_dir: /app
    command: >
      sh -c "pip install uv &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv sync &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv run celery -A app.worker.celery_app:celery_app worker --pool=solo --concurrency=1 --loglevel=info"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  beat:
    container_name: price_tracker_beat
    image: python:3.13-slim
    working_dir: /app
    command: >
      sh -c "pip install uv &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv sync &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv run celery -A app.worker.celery_app:celery_app beat --loglevel=info"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
