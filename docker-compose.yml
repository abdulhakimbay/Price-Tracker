services:
  db:
    image: postgres:15-alpine
    container_name: price_tracker_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"

  redis:
    image: redis:7-alpine
    container_name: price_tracker_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"