services:
  app:
    container_name: price_tracker_app
    image: python:3.13-slim
    working_dir: /app
    command: >
      sh -c "pip install uv &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv sync &&
      UV_PROJECT_ENVIRONMENT=/opt/venv uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    container_name: price_tracker_db
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
