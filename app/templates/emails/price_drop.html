<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price alert</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f1ea;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f1ea;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(15,23,42,0.08);">
            <tr>
              <td style="padding:32px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#ffffff;">
                <div style="font-size:13px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.8;">$app_name</div>
                <h1 style="margin:12px 0 0;font-size:30px;line-height:1.2;">Your price target was reached</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="margin:0 0 24px;font-size:16px;line-height:1.7;">
                  The product you are tracking has reached your target price.
                </p>

                <div style="border:1px solid #e5e7eb;border-radius:16px;padding:24px;background-color:#fafaf9;">
                  <div style="font-size:14px;color:#6b7280;margin-bottom:8px;">Product</div>
                  <div style="font-size:24px;font-weight:700;line-height:1.3;margin-bottom:20px;">$product_title</div>

                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                    <tr>
                      <td style="padding:0 0 12px;font-size:14px;color:#6b7280;">Current price</td>
                      <td align="right" style="padding:0 0 12px;font-size:18px;font-weight:700;color:#047857;">$current_price</td>
                    </tr>
                    <tr>
                      <td style="padding:0;font-size:14px;color:#6b7280;">Your target</td>
                      <td align="right" style="padding:0;font-size:18px;font-weight:700;color:#111827;">$target_price</td>
                    </tr>
                  </table>
                </div>

                <div style="margin-top:28px;">
                  <a
                    href="$product_url"
                    style="display:inline-block;padding:14px 22px;background-color:#1d4ed8;color:#ffffff;text-decoration:none;border-radius:12px;font-weight:700;"
                  >
                    Open product
                  </a>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px;background-color:#f8fafc;color:#6b7280;font-size:13px;line-height:1.6;">
                This email was sent by $app_name because a tracked product reached your price target.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
